name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      # OIDC trusted publishing needs npm >= 11.5.1; node 22 ships npm 10.9.
      # Auth is via GitHub's OIDC token (id-token: write) + a Trusted Publisher
      # configured for this package on npmjs.com — no NPM_TOKEN required.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
