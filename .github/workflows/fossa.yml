name: fossa

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: FOSSA Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run FOSSA scan and test
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          branch: ${{ github.head_ref || github.ref_name }}
          run-tests: true
