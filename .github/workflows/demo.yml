name: Generate Demo GIF

on:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-demo.js'
      - 'src/components/AdminDashboard.stories.js'
      - '.storybook/**'
      - '.github/workflows/demo.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/generate-demo.js'
      - 'src/components/AdminDashboard.stories.js'
      - '.storybook/**'
      - '.github/workflows/demo.yml'
  workflow_dispatch:
  schedule:
    # Daily at 14:17 UTC (off-hour to dodge cron congestion on :00).
    - cron: '17 14 * * *'

permissions:
  contents: write

concurrency:
  group: demo-gif-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: node_modules/.bin/playwright install chromium --with-deps

      - name: Build Storybook
        run: node_modules/.bin/storybook build --output-dir storybook-static

      - name: Start Storybook server
        run: |
          npx http-server storybook-static -p 6006 -s &
          echo "STORYBOOK_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6006 -o /dev/null; then
              echo "[ready] Storybook up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Storybook did not become ready within 30s"
          exit 1

      - name: Generate demo GIF
        run: node scripts/generate-demo.js
        env:
          DEMO_BASE_URL: http://localhost:6006
          DEMO_DEBUG_FRAMES: '1'

      - name: Stop Storybook server
        if: always()
        run: |
          if [ -n "${STORYBOOK_PID:-}" ]; then
            kill "$STORYBOOK_PID" 2>/dev/null || true
          fi

      - name: Verify GIF was generated
        run: |
          GIF=".github/profile/demo.gif"
          if [ ! -f "$GIF" ]; then
            echo "::error::Expected $GIF was not produced"
            exit 1
          fi
          SIZE=$(stat -c%s "$GIF")
          echo "[verify] $GIF size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "::error::Generated GIF is implausibly small ($SIZE bytes); recording flow likely failed"
            exit 1
          fi
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::warning::Generated GIF exceeds 5MB target ($SIZE bytes); consider lowering fps or scale in scripts/generate-demo.js"
          fi

      - name: Upload GIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: .github/profile/demo.gif
          retention-days: 14

      - name: Upload debug frames
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-debug-frames
          path: .github/profile/demo_frame_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit updated GIF
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update demo GIF [skip ci]'
          file_pattern: '.github/profile/demo.gif'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
